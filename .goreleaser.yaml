version: 2

project_name: hnews

before:
  hooks:
    - go mod tidy

builds:
  - binary: hnews
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "^Merge pull request"

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

brews:
  - name: hnews
    repository:
      owner: offbeatengineer
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/offbeatengineer/hnews"
    description: "A minimalist, premium Hacker News client"
    license: MIT
    install: |
      bin.install "hnews"
    test: |
      system "#{bin}/hnews", "--version"
